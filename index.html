<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceFlow - AI-Powered Invoice Automation for SMBs | Automate Your AP</title>
    <meta name="description" content="InvoiceFlow automates invoice processing for small to mid-market businesses. Capture, extract, validate, and post invoices to QuickBooks, Xero, or Wave in minutes. Cut AP processing time from 15 minutes to 2 minutes per invoice.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e1a;
            --cyan-primary: #00d4ff;
            --gold-accent: #ffd700;
            --text-light: #e6e6e6;
            --text-muted: #a0a0a0;
            --card-bg: #0f1628;
            --border-color: #1a2847;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--cyan-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-brand::before {
            content: '⚡';
            font-size: 1.8rem;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }

        .nav-menu a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover {
            color: var(--cyan-primary);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--cyan-primary);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .cta-button {
            background: linear-gradient(135deg, var(--cyan-primary), #0099cc);
            color: var(--bg-dark);
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--cyan-primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Hero Section */
        .hero {
            padding-top: 120px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1628 50%, #0a0e1a 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-slow 20s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-slow-reverse 25s ease-in-out infinite;
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(30px) translateX(20px); }
        }

        @keyframes float-slow-reverse {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(-20px); }
        }

        .hero-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }

        .hero-content h1 span {
            color: var(--cyan-primary);
            display: block;
        }

        .hero-content .tagline {
            font-size: 1.2rem;
            color: var(--gold-accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .hero-subheadline {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.8;
            max-width: 500px;
        }

        .typing-text {
            display: inline;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--cyan-primary);
            animation: typing 3.5s steps(60, end) once, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            from, to { border-color: var(--cyan-primary); }
            50% { border-color: transparent; }
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cyan-primary), #0099cc);
            color: var(--bg-dark);
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--cyan-primary);
            padding: 1rem 2rem;
            border: 2px solid var(--cyan-primary);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-3px);
        }

        .hero-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .stat-item {
            padding: 1.5rem;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            position: relative;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--cyan-primary);
            border-radius: 8px 0 0 8px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--cyan-primary);
            font-family: 'Space Grotesk', sans-serif;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Dashboard Mockup */
        .dashboard-mockup {
            position: relative;
            height: 500px;
        }

        .mockup-card {
            position: absolute;
            background: linear-gradient(135deg, #0f1628, #1a2847);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            animation: float-card 6s ease-in-out infinite;
        }

        @keyframes float-card {
            0%, 100% { transform: translateY(0) rotateZ(-2deg); }
            50% { transform: translateY(-20px) rotateZ(2deg); }
        }

        .mockup-card:nth-child(1) {
            width: 350px;
            top: 20px;
            right: 10px;
            animation-delay: 0s;
        }

        .mockup-card:nth-child(2) {
            width: 320px;
            top: 200px;
            left: 30px;
            animation-delay: 1s;
        }

        .mockup-card:nth-child(3) {
            width: 340px;
            bottom: 30px;
            right: 50px;
            animation-delay: 2s;
        }

        .mockup-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .mockup-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .mockup-dot:nth-child(1) { background: #ff6b6b; }
        .mockup-dot:nth-child(2) { background: #ffd700; }
        .mockup-dot:nth-child(3) { background: #00d4ff; }

        .mockup-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
            margin-top: 1rem;
        }

        .mockup-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--cyan-primary);
            margin-top: 0.5rem;
        }

        .mockup-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 3px;
            margin-top: 0.75rem;
            overflow: hidden;
        }

        .mockup-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan-primary), var(--gold-accent));
            animation: fill-bar 2s ease-in-out infinite;
        }

        @keyframes fill-bar {
            0%, 100% { width: 60%; }
            50% { width: 85%; }
        }

        /* Features Section */
        .features {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.02) 0%, transparent 100%);
            position: relative;
        }

        .features-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .section-header h2 span {
            color: var(--cyan-primary);
        }

        .section-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .feature-card:hover::before {
            left: 100%;
        }

        .feature-card:hover {
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.15);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .feature-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            color: var(--text-light);
        }

        .feature-card p {
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        /* Security Badges Section */
        .security {
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(255, 215, 0, 0.02));
        }

        .security-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .security-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .security-header h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .security-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .badge {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 215, 0, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .badge:hover {
            border-color: var(--cyan-primary);
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(255, 215, 0, 0.08));
        }

        .badge-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .badge h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .badge p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Stats Counter Section */
        .stats-section {
            padding: 5rem 2rem;
            background: linear-gradient(180deg, transparent, rgba(0, 212, 255, 0.03));
        }

        .stats-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
        }

        .stats-card {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stats-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .counter {
            font-size: 3rem;
            font-weight: 700;
            color: var(--cyan-primary);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 0.5rem;
        }

        .counter-label {
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* Integrations Section */
        .integrations {
            padding: 5rem 2rem;
        }

        .integrations-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .integrations-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .integrations-header h2 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .integrations-header p {
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto;
        }

        .integration-logos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            align-items: center;
            justify-items: center;
        }

        .integration-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 80px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 700;
            color: var(--cyan-primary);
            font-size: 1.2rem;
            text-align: center;
            padding: 1rem;
        }

        .integration-logo:hover {
            border-color: var(--cyan-primary);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 215, 0, 0.05));
            transform: translateY(-5px);
        }

        /* ROI Calculator */
        .roi-calculator {
            padding: 5rem 2rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(255, 215, 0, 0.04));
        }

        .roi-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .roi-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .roi-header h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .roi-header p {
            color: var(--text-muted);
        }

        .roi-content {
            background: linear-gradient(135deg, #0f1628, #1a2847);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            padding: 3rem;
        }

        .slider-group {
            margin-bottom: 2.5rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .slider-label span {
            color: var(--text-light);
        }

        .slider-value {
            color: var(--cyan-primary);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), rgba(0, 212, 255, 0.3));
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--cyan-primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--cyan-primary);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: all 0.3s ease;
        }

        .roi-result {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 215, 0, 0.05));
            border: 2px solid var(--cyan-primary);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-top: 2rem;
        }

        .roi-result-label {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .roi-result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold-accent);
            font-family: 'Space Grotesk', sans-serif;
        }

        .roi-result-sublabel {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* Testimonials */
        .testimonials {
            padding: 5rem 2rem;
        }

        .testimonials-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .testimonials-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .testimonials-header h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .testimonials-header p {
            color: var(--text-muted);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .testimonial-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.15);
        }

        .stars {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 1rem;
        }

        .star {
            color: var(--gold-accent);
            font-size: 1.1rem;
        }

        .testimonial-quote {
            color: var(--text-light);
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan-primary), var(--gold-accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--bg-dark);
            font-size: 1.1rem;
        }

        .author-info h3 {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 0.2rem;
        }

        .author-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Pricing */
        .pricing {
            padding: 5rem 2rem;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.02), transparent);
        }

        .pricing-container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .pricing-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .pricing-header h2 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .pricing-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--cyan-primary);
        }
