<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceAI - AI-Powered Invoice Processing for Agencies & Service Firms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e1a;
            --cyan: #00d4ff;
            --gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c8;
            --border-color: rgba(0, 212, 255, 0.1);
            --card-bg: rgba(15, 23, 42, 0.8);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-primary);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 1.5rem;
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        a {
            color: var(--cyan);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--gold);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            font-size: 0.95rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--cyan);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover {
            color: var(--cyan);
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .hamburger span {
            width: 25px;
            height: 2px;
            background: var(--cyan);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .cta-nav {
            background: linear-gradient(135deg, var(--cyan), #00a8cc);
            color: var(--bg-dark);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .cta-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
            color: var(--bg-dark);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 2rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-text h1 {
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-text .tagline {
            font-size: 1.25rem;
            color: var(--cyan);
            margin-bottom: 1.5rem;
            font-weight: 600;
            animation: fadeInUp 0.8s ease 0.1s both;
        }

        .hero-text p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .typing-effect {
            display: inline-block;
            position: relative;
            animation: typeWriter 3s steps(50, end) 0.5s 1 normal both;
        }

        @keyframes typeWriter {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--cyan), #00a8cc);
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease 0.3s both;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00a8cc, var(--gold));
            transition: left 0.3s ease;
            z-index: -1;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.4);
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .cta-button:active::after {
            width: 300px;
            height: 300px;
        }

        .secondary-button {
            display: inline-block;
            padding: 1rem 2rem;
            border: 2px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 1rem;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .secondary-button:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.2);
        }

        /* 3D Dashboard Mockup */
        .dashboard-mockup {
            perspective: 1200px;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .dashboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            transform: rotateY(-15deg) rotateX(5deg);
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        -20px 20px 40px rgba(0, 212, 255, 0.1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: rotateY(-15deg) rotateX(5deg) translateY(0px);
            }
            50% {
                transform: rotateY(-15deg) rotateX(5deg) translateY(-20px);
            }
        }

        .dashboard-card:hover {
            transform: rotateY(-10deg) rotateX(8deg) translateY(-10px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.4),
                        -25px 25px 50px rgba(0, 212, 255, 0.15);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .dashboard-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .dashboard-status {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--cyan);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(0, 212, 255, 0);
            }
        }

        .dashboard-stat {
            margin-bottom: 1.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'Space Grotesk', sans-serif;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--gold));
            border-radius: 4px;
            width: 92%;
            animation: fillBar 2s ease;
        }

        @keyframes fillBar {
            from {
                width: 0;
            }
            to {
                width: 92%;
            }
        }

        /* Social Proof Stats */
        .social-proof {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            backdrop-filter: blur(20px);
            margin-top: 4rem;
            animation: fadeInUp 0.8s ease 0.5s both;
        }

        .proof-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .proof-stat {
            padding: 1.5rem;
        }

        .proof-stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--cyan);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 0.5rem;
            counter-increment: stat-counter;
        }

        .proof-stat-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Features Section */
        .features {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.02) 0%, transparent 100%);
        }

        .features-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            margin-bottom: 1rem;
        }

        .section-header p {
            font-size: 1.15rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: slideInCard 0.6s ease forwards;
        }

        @keyframes slideInCard {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-card:nth-child(1) { animation-delay: 0.1s; }
        .feature-card:nth-child(2) { animation-delay: 0.2s; }
        .feature-card:nth-child(3) { animation-delay: 0.3s; }
        .feature-card:nth-child(4) { animation-delay: 0.4s; }
        .feature-card:nth-child(5) { animation-delay: 0.5s; }
        .feature-card:nth-child(6) { animation-delay: 0.6s; }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .feature-card:hover::before {
            left: 100%;
        }

        .feature-card:hover {
            border-color: var(--cyan);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: var(--cyan);
        }

        .feature-card h3 {
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .feature-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Integration Section */
        .integrations {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 212, 255, 0.02) 100%);
        }

        .integrations-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .integrations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
            align-items: center;
            justify-items: center;
        }

        .integration-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .integration-item:hover {
            border-color: var(--cyan);
            background: rgba(0, 212, 255, 0.05);
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.15);
        }

        .integration-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .integration-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Testimonials Section */
        .testimonials {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.02) 0%, transparent 100%);
        }

        .testimonials-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .testimonial-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
        }

        .testimonial-card:hover {
            border-color: var(--gold);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.15);
        }

        .testimonial-stars {
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .testimonial-text {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: var(--text-secondary);
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--bg-dark);
            font-size: 0.9rem;
        }

        .author-info h4 {
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .author-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* ROI Calculator */
        .roi-calculator {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.02) 0%, transparent 100%);
        }

        .roi-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .calculator-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            backdrop-filter: blur(20px);
        }

        .calculator-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .calculator-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .control-input {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(0, 212, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--cyan);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            width: 28px;
            height: 28px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.7);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--cyan);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: all 0.3s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            width: 28px;
            height: 28px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.7);
        }

        .control-value {
            font-weight: 700;
            color: var(--cyan);
            font-size: 1.1rem;
            min-width: 60px;
            text-align: right;
        }

        .calculator-result {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 215, 0, 0.05));
            border: 2px solid var(--cyan);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-top: 2rem;
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Compliance & Security Section */
        .compliance {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 212, 255, 0.02) 100%);
        }

        .compliance-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .compliance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .compliance-badge {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .compliance-badge:hover {
            border-color: var(--cyan);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.15);
        }

        .badge-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .compliance-badge h3 {
            margin-bottom: 0.75rem;
        }

        .compliance-badge p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Pricing Section */
        .pricing {
            padding: 6rem 2rem;
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.02) 0%, transparent 100%);
        }

        .pricing-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .pricing-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .pricing-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .toggle-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: var(--cyan);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: var(--cyan);
            border-radius: 12px;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-switch.active::after {
            left: 36px;
        }

        .discount-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--bg-dark);
            padding: 0.5rem 1rem;
            border-radius: 8px;
